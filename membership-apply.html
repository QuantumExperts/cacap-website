<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Apply for CACAP membership and join the construction dispute resolution community across the Asia Pacific region.">
<link rel="icon" type="image/png" href="logo-white.png">
<title>Apply for Membership | CACAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=11">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="hero-sm hero-membership">
  <div class="hero-content">
    <h1>Apply for <span class="gold">Membership</span></h1>
  </div>
</section>

<section class="section">
  <div class="section-inner" style="max-width: 760px;">
    <h2 class="section-title">Membership Application Form</h2>

    <form name="membership-application" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thank-you.html" class="form-group">
      <input type="hidden" name="form-name" value="membership-application">
      <p style="display:none;"><label>Don't fill this out: <input name="bot-field"></label></p>

      <label for="fullname">Full Name <span style="color: var(--gold);">*</span></label>
      <input type="text" id="fullname" name="full-name" placeholder="Full Name" required>

      <label for="email">Email <span style="color: var(--gold);">*</span></label>
      <input type="email" id="email" name="email" placeholder="Email Address" required>

      <label for="phone">Phone <span style="color: var(--gold);">*</span></label>
      <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>

      <label for="organisation">Organisation</label>
      <input type="text" id="organisation" name="organisation" placeholder="Organisation">

      <label for="position">Position/Title</label>
      <input type="text" id="position" name="position-title" placeholder="Position or Title">

      <label for="country">Country</label>
      <input type="text" id="country" name="country" placeholder="Country">

      <label for="membership">Membership Category <span style="color: var(--gold);">*</span></label>
      <select id="membership" name="membership-category" required>
        <option value="">Select membership category</option>
        <option value="founding">Founding Member</option>
        <option value="full">Full Member</option>
        <option value="associate">Associate Member</option>
        <option value="student">Student Member</option>
        <option value="institutional">Institutional Member</option>
      </select>

      <label for="qualifications">Professional Qualifications <span style="color: var(--gold);">*</span></label>
      <textarea id="qualifications" name="professional-qualifications" placeholder="List your relevant professional qualifications and memberships" required style="min-height: 100px;"></textarea>

      <label for="expertise">Areas of Expertise <span style="color: var(--gold);">*</span></label>
      <textarea id="expertise" name="areas-of-expertise" placeholder="Describe your areas of expertise and specialisation" required style="min-height: 100px;"></textarea>

      <label for="experience">Brief Summary of Experience <span style="color: var(--gold);">*</span></label>
      <textarea id="experience" name="experience-summary" placeholder="Provide a brief summary of your professional experience in dispute resolution" required style="min-height: 120px;"></textarea>

      <label for="cv">Curriculum Vitae / Resume</label>
      <input type="file" id="cv" name="cv-resume">

      <div class="form-check">
        <input type="checkbox" id="confirm" name="information-accurate" required>
        <label for="confirm" style="margin-left: 8px;">I confirm that the information provided is complete and accurate <span style="color: var(--gold);">*</span></label>
      </div>

      <div class="form-check">
        <input type="checkbox" id="contact" name="agree-contact" required>
        <label for="contact" style="margin-left: 8px;">I agree to be contacted by CACAP regarding my application <span style="color: var(--gold);">*</span></label>
      </div>

      <button type="submit" class="btn-p" style="margin-top: 24px;">Submit Application</button>
    </form>

    <div style="margin-top: 40px; padding: 24px; border-left: 4px solid var(--gold); background: var(--light-cream);">
      <p class="text-body" style="font-size: 14px;"><strong>Confidentiality:</strong> All information submitted through this form is handled in strict confidence and accessed only by authorised personnel of CACAP.</p>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/site.js"></script>
</body>
</html>
