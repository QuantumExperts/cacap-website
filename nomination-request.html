<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Submit a nomination request to CACAP for the appointment of a qualified neutral for your construction or infrastructure dispute.">
<link rel="icon" type="image/png" href="logo-white.png">
<title>Nomination Request | CACAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=6">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="hero-sm hero-services">
  <div class="hero-content">
    <h1>Nomination <span class="gold">Request</span></h1>
  </div>
</section>

<section class="section">
  <div class="section-inner" style="max-width: 760px;">
    <h2 class="section-title">Nomination Request Form</h2>

    <form action="https://formsubmit.co/info@cacap.asia" method="POST" name="nomination-request" class="form-group">

      <label for="company">Company Name <span style="color: var(--gold);">*</span></label>
      <input type="text" id="company" name="company-name" placeholder="Company Name" required>

      <label for="email">Email <span style="color: var(--gold);">*</span></label>
      <input type="email" id="email" name="email" placeholder="Email Address" required>

      <label for="phone">Phone <span style="color: var(--gold);">*</span></label>
      <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>

      <label for="address">Address</label>
      <input type="text" id="address" name="address" placeholder="Street Address">

      <label for="contact-person">Contact Person <span style="color: var(--gold);">*</span></label>
      <input type="text" id="contact-person" name="contact-person" placeholder="Contact Person Name" required>

      <label for="resolver-type">Type of Dispute Resolver <span style="color: var(--gold);">*</span></label>
      <select id="resolver-type" name="type-of-dispute-resolver" required>
        <option value="">Select type</option>
        <option value="arbitrator">Arbitrator</option>
        <option value="mediator">Mediator</option>
        <option value="expert-determiner">Expert Determiner</option>
        <option value="expert-witness">Expert Witness</option>
        <option value="dispute-board-member">Dispute Board Member</option>
      </select>

      <label for="urgency">Urgency/Timeline</label>
      <input type="text" id="urgency" name="urgency-timeline" placeholder="e.g., Urgent (within 7 days), Standard (within 14 days)">

      <label for="dispute-nature">Subject or Nature of Dispute <span style="color: var(--gold);">*</span></label>
      <textarea id="dispute-nature" name="subject-or-nature-of-dispute" placeholder="Please provide details of the dispute, including required expertise and relevant contractual provisions" required style="min-height: 120px;"></textarea>

      <label for="documents">Supporting Documents</label>
      <input type="file" id="documents" name="supporting-documents">

      <div class="form-check">
        <input type="checkbox" id="confirm" name="information-accurate" required>
        <label for="confirm" style="margin-left: 8px;">I confirm that the information provided is complete and accurate <span style="color: var(--gold);">*</span></label>
      </div>

      <div class="form-check">
        <input type="checkbox" id="contact-agree" name="agree-to-contact" required>
        <label for="contact-agree" style="margin-left: 8px;">I agree to be contacted by CACAP regarding this nomination request <span style="color: var(--gold);">*</span></label>
      </div>

      <button type="submit" class="btn-p" style="margin-top: 24px;">Submit Nomination Request</button>
    </form>

    <div style="margin-top: 40px; padding: 24px; border-left: 4px solid var(--gold); background: var(--light-cream);">
      <p class="text-body" style="font-size: 14px;"><strong>Confidentiality:</strong> All information submitted through this form is handled in strict confidence and accessed only by authorised personnel of CACAP.</p>
    </div>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/site.js"></script>
</body>
</html>
