<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Register your interest in CACAP accreditation courses and professional development programmes.">
<link rel="icon" type="image/png" href="logo-white.png">
<title>Register Interest | CACAP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="site-header" id="site-header"></header>

<section class="hero-sm">
  <div class="hero-content">
    <h1>Register <span class="gold">Interest</span></h1>
    <p>Express your interest in upcoming CACAP accreditation intakes and training courses.</p>
  </div>
</section>

<section class="section">
  <div class="section-inner" style="max-width:640px;">
    <h2 class="section-title">Register Your Interest</h2>

    <form action="https://formsubmit.co/info@cacap.asia" method="POST" name="register-interest" class="form-group">
      <label for="fullname">Full Name <span style="color: var(--gold);">*</span></label>
      <input type="text" id="fullname" name="full-name" placeholder="Full Name" required>

      <label for="email">Email <span style="color: var(--gold);">*</span></label>
      <input type="email" id="email" name="email" placeholder="Email Address" required>

      <label for="organisation">Organisation</label>
      <input type="text" id="organisation" name="organisation" placeholder="Organisation">

      <label for="enquiry-type">Enquiry Type <span style="color: var(--gold);">*</span></label>
      <select id="enquiry-type" name="enquiry-type" required>
        <option value="">Select enquiry type</option>
        <option value="accreditation">Accreditation Enquiry</option>
        <option value="training-course">Training Course Enquiry</option>
        <option value="general">General Enquiry</option>
      </select>

      <label for="discipline">Discipline of Interest</label>
      <select id="discipline" name="discipline-of-interest">
        <option value="">Select discipline</option>
        <option value="dispute-board">Dispute Board</option>
        <option value="arbitration">Arbitration</option>
        <option value="expert-determination">Expert Determination</option>
        <option value="mediation">Mediation</option>
        <option value="other">Other</option>
      </select>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Any additional information"></textarea>

      <button type="submit" class="btn-p" style="margin-top: 16px;">Submit</button>
    </form>

    <p class="text-body" style="margin-top: 32px; font-size: 14px; color: var(--text-light);">Alternatively, you may register your interest by email to <a href="mailto:info@cacap.asia" style="color: var(--gold);">info@cacap.asia</a>.</p>
  </div>
</section>

<footer class="site-footer" id="site-footer"></footer>
<script src="js/site.js"></script>
</body>
</html>
